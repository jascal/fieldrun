name: Build & deploy paper site

# The explanatory supplement (paper/*supplement*.pdf) is turned into the
# slide-reader site automatically: scripts/build_site.py extracts its text,
# places the slide highlights from site/slides.json, renders
# site/template.html, and the result is deployed to GitHub Pages. The
# original research paper ships alongside it as docs/paper.pdf (linked).
#
# To publish a new revision: replace the PDF(s) in paper/ and push.

on:
  push:
    branches: [master]
    paths:
      - 'paper/**'
      - 'site/**'
      - 'scripts/build_site.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Install pdftotext
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Build site from the supplement PDF
        run: python3 scripts/build_site.py
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v5
