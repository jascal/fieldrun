[package]
name = "fieldrun"
version = "0.1.0"
edition = "2021"
description = "Run a decompiled LLM as a single native binary — the three pylm tiers (retrieval / composition / router) in pure Rust, no framework at runtime."
license = "Apache-2.0"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[bin]]
name = "fieldrun"
path = "src/main.rs"

[profile.release]
lto = true
codegen-units = 1
